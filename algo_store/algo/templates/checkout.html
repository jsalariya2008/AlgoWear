{% extends 'base.html' %}
{% block title %}Checkout — ALGO{% endblock %}

{% block content %}
<div style="padding:calc(70px + 60px) 5vw 80px; max-width:600px; margin:0 auto;">
  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.06em;margin-bottom:8px;">Checkout</h1>
  <p style="font-family:'DM Mono',monospace;font-size:.75rem;color:rgba(0,0,0,.4);letter-spacing:.1em;margin-bottom:40px;">
    ORDER #{{ order_id }}
  </p>

  <div style="background:#fdfaf6;padding:28px;margin-bottom:24px;">
    <div style="display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:.8rem;margin-bottom:12px;">
      <span>Order Total</span>
      <span>₹{{ "%.2f"|format(amount / 100) }}</span>
    </div>
    <div style="height:1px;background:rgba(0,0,0,.07);margin:16px 0;"></div>
    <p style="font-family:'DM Mono',monospace;font-size:.68rem;color:rgba(0,0,0,.35);letter-spacing:.08em;">
      Secured by Razorpay · UPI · Cards · Netbanking · Wallets
    </p>
  </div>

  <button id="payBtn"
    style="width:100%;background:#c0392b;color:#fdfaf6;font-family:'DM Mono',monospace;
           font-size:.75rem;letter-spacing:.16em;text-transform:uppercase;
           padding:16px;border:none;cursor:pointer;transition:background .3s;"
    onmouseover="this.style.background='#962d22'"
    onmouseout="this.style.background='#c0392b'">
    Pay ₹{{ "%.2f"|format(amount / 100) }} Securely
  </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
const options = {
  key: '{{ rz_key }}',
  amount: {{ amount }},
  currency: 'INR',
  name: 'ALGO',
  description: 'Streetwear Order #{{ order_id }}',
  image: '/static/images/logo.png',
  order_id: '{{ rz_order_id }}',
  prefill: {
    name: '{{ user_name }}',
  },
  theme: { color: '#c0392b' },
  handler: function(response) {
    // Payment successful — verify server-side
    fetch('/payment/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        razorpay_order_id:   response.razorpay_order_id,
        razorpay_payment_id: response.razorpay_payment_id,
        razorpay_signature:  response.razorpay_signature,
        order_id: {{ order_id }}
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        window.location.href = '/order/success/' + data.order_id;
      } else {
        alert('Payment verification failed. Contact support.');
      }
    });
  },
  modal: {
    ondismiss: function() {
      console.log('Checkout closed by user');
    }
  }
};

document.getElementById('payBtn').onclick = function() {
  const rzp = new Razorpay(options);
  rzp.open();
};
</script>
{% endblock %}
